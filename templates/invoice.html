<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PHN POOLS Invoice</title>
  <style>
    @page { margin: 0; }
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: linear-gradient(180deg, #0a2a4a 0%, #1e4d6e 100%);
      color: #111;
      line-height: 1.5;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #0a2a4a;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .logo img { height: 140px; width: auto; }
    .title { font-size: 36px; font-weight: bold; color: #0a2a4a; text-align: right; }
    table { width: 100%; border-collapse: collapse; margin: 30px 0; }
    th, td { padding: 12px; border: 1px solid #ccc; text-align: left; }
    th { background: #0a2a4a; color: white; }
    .total { font-size: 26px; text-align: right; font-weight: bold; margin-top: 40px; color: #0a2a4a; }
    .footer { margin-top: 60px; text-align: center; font-size: 13px; color: #444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="https://i.imgur.com/placeholder.png" alt="PHN POOLS" style="height:140px;">
      <!-- Your real logo will be added here as base64 in the next step -->
    </div>
    <div>
      <div class="title">{{title}}</div>
      <div style="text-align:right; margin-top:8px; font-size:18px;">{{date}}</div>
    </div>
  </div>

  <h2>Bill To: {{customerName}}</h2>
  <p>{{customerAddress}}</p>

  <table>
    <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
    {{items}}
  </table>

  <div class="total">Total Due: ${{total}}</div>

  <div class="footer">
    PHN POOLS • Premium Pool Maintenance &amp; Water Chemistry<br>
    Azusa, CA • Thank you for choosing PHN POOLS!
  </div>
</body>
</html>
